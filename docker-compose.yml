services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    container_name: sotoon-web
    restart: unless-stopped
    # No host port publish — Caddy is the only public entry point.
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: "file:/app/data/sotoon.db"
      UPLOAD_DIR: /app/public/uploads
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      # Now that Caddy serves HTTPS, cookies can be marked Secure.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    volumes:
      - sotoon-db:/app/data
      - sotoon-uploads:/app/public/uploads

  caddy:
    image: caddy:2-alpine
    container_name: sotoon-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  sotoon-db:
  sotoon-uploads:
  caddy-data:
  caddy-config:
