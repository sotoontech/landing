services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    container_name: sotoon-web
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: "file:/app/data/sotoon.db"
      UPLOAD_DIR: /app/public/uploads
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    volumes:
      - sotoon-db:/app/data
      - sotoon-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/fa"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  sotoon-db:
  sotoon-uploads:
